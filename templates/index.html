<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Prediction App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 420px;
            margin: 30px auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            padding: 12px;
            width: 100%;
            background: #667eea;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>

<body>

    <h1>🎓 Student Prediction App</h1>

    <div class="container">

        <form action="/predict" method="post">

            <!-- NUMERICAL -->
            <input type="number" step="any" name="age" placeholder="Age" required>
            <input type="number" step="any" name="study_hours" placeholder="Study Hours" required>
            <input type="number" step="any" name="class_attendance" placeholder="Class Attendance (%)" required>
            <input type="number" step="any" name="sleep_hours" placeholder="Sleep Hours" required>

            <!-- CATEGORICAL (MATCH TRAIN DATA EXACTLY) -->

            <select name="sleep_quality" required>
                <option value="">Sleep Quality</option>
                <option value="poor">Poor</option>
                <option value="average">Average</option>
                <option value="good">Good</option>
            </select>

            <select name="facility_rating" required>
                <option value="">Facility Rating</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>

            <select name="exam_difficulty" required>
                <option value="">Exam Difficulty</option>
                <option value="easy">Easy</option>
                <option value="moderate">Moderate</option>
                <option value="hard">Hard</option>
            </select>

            <select name="gender" required>
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>

            <select name="course" required>
                <option value="">Select Course</option>
                <option value="b.tech">B.Tech</option>
                <option value="b.sc">B.Sc</option>
                <option value="b.com">B.Com</option>
                <option value="bca">BCA</option>
                <option value="bba">BBA</option>
                <option value="ba">BA</option>
                <option value="diploma">Diploma</option>
            </select>

            <select name="study_method" required>
                <option value="">Study Method</option>
                <option value="coaching">Coaching</option>
                <option value="self-study">Self Study</option>
                <option value="mixed">Mixed</option>
                <option value="group study">Group Study</option>
                <option value="online videos">Online Videos</option>
            </select>

            <select name="internet_access" required>
                <option value="">Internet Access</option>
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>

            <button type="submit">Predict</button>

        </form>

        <div class="result">
            {{ prediction_text }}
        </div>
        

    </div>

</body>
</html>
